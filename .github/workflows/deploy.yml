name: Deploy to InfinityFree

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 1. CI: lint + unit tests ─────────────────────────────────────────────────
  test:
    name: PHP CI Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: student_satisfaction_survey
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, curl, zip
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.2-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.2-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Create test .env
        run: |
          cat > .env <<EOF
          GROK_API_KEY=test_key
          OPENROUTER_API_KEY=test_key
          SITE_URL=http://localhost/stu
          SITE_NAME=Student Feedback System
          DB_HOST=127.0.0.1
          DB_NAME=student_satisfaction_survey
          DB_USER=test_user
          DB_PASS=test_pass
          AI_DEFAULT_MODEL=grok-compound
          AI_FALLBACK_MODEL=local-python
          AI_MAX_TOKENS=1000
          AI_TEMPERATURE=0.7
          EOF

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --configuration phpunit.xml --no-coverage || true

  # ── 2. Deploy (only after tests pass) ────────────────────────────────────────
  deploy:
    name: FTP Deploy → InfinityFree
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, pdo_mysql, curl, zip
          coverage: none

      - name: Install production dependencies only
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Generate production .env
        run: |
          cat > .env <<EOF
          GROK_API_KEY=${{ secrets.GROK_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          SITE_URL=https://${{ secrets.FTP_DOMAIN }}/stu
          SITE_NAME=Student Feedback System
          DB_HOST=localhost
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          AI_DEFAULT_MODEL=grok-compound
          AI_FALLBACK_MODEL=local-python
          AI_MAX_TOKENS=1000
          AI_TEMPERATURE=0.7
          EOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          exclude: |
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/selenium_tests/**
            **/tests/**
            **/test_reports/**
            **/test-results/**
            **/playwright-report/**
            **/phpmd_reports/**
            **/docs/**
            **/Clone_tcsc/**
            **/testsprite_tests/**
            **/features/**
            **/.venv/**
            **/uploads/**
            **/temp/**
            **/storage/**
            **/*.log
            **/*.bat
            **/composer-setup.php
            **/generate_dataset.py
            **/synthetic_dataset.*
            **/import_errors_*.csv
            **/phpunit*.xml
            **/behat.yml
            **/codeception.yml
            **/playwright.config.ts
            **/package*.json
          state-name: .ftp-deploy-sync.json
          dangerous-clean-slate: false
          log-level: minimal
