name: Student Survey System CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_survey_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    strategy:
      matrix:
        php-version: [8.1, 8.2]

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP ${{ matrix.php-version }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, curl, zip
        ini-values: post_max_size=256M, upload_max_filesize=256M
        coverage: xdebug

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Validate composer.json and composer.lock
      run: composer validate --strict --no-check-all || echo "No composer.json found, skipping validation"

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ matrix.php-version }}-

    - name: Create composer.json if not exists
      run: |
        if [ ! -f composer.json ]; then
          echo "Creating composer.json for project"
          cat > composer.json << 'EOF'
        {
            "name": "rishi/student-survey-system",
            "description": "Student Satisfaction Survey System with AI Integration",
            "type": "project",
            "require": {
                "php": ">=8.1"
            },
            "require-dev": {
                "phpunit/phpunit": "^10.0",
                "squizlabs/php_codesniffer": "^3.7"
            },
            "autoload": {
                "psr-4": {
                    "App\\": "app/",
                    "Core\\": "core/"
                }
            },
            "scripts": {
                "test": "vendor/bin/phpunit",
                "cs-check": "vendor/bin/phpcs --standard=PSR12 app/ core/ public/",
                "cs-fix": "vendor/bin/phpcbf --standard=PSR12 app/ core/ public/"
            }
        }
        EOF
        fi

    - name: Install Composer dependencies
      run: composer install --prefer-dist --no-progress --no-interaction

    - name: Install npm dependencies
      run: |
        if [ -f package.json ]; then
          npm ci
        else
          echo "No package.json found, skipping npm install"
        fi

    - name: PHP Syntax Check
      run: |
        echo "Checking PHP syntax..."
        find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -exec php -l {} \; || exit 1

    - name: Setup Test Database
      run: |
        echo "Setting up test database..."
        mysql -h 127.0.0.1 -P 3306 -u root -proot -e "CREATE DATABASE IF NOT EXISTS test_survey_db;"
        if [ -f database/final_database_setup.sql ]; then
          mysql -h 127.0.0.1 -P 3306 -u root -proot test_survey_db < database/final_database_setup.sql
        else
          echo "No database schema file found, skipping database setup"
        fi

    - name: Create PHPUnit config if not exists
      run: |
        if [ ! -f phpunit.xml ]; then
          echo "Creating phpunit.xml configuration"
          cat > phpunit.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <phpunit xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                 xsi:noNamespaceSchemaLocation="vendor/phpunit/phpunit/phpunit.xsd"
                 bootstrap="tests/bootstrap.php"
                 colors="true">
            <testsuites>
                <testsuite name="Unit">
                    <directory suffix="Test.php">./tests/Unit</directory>
                </testsuite>
                <testsuite name="Integration">
                    <directory suffix="Test.php">./tests/Integration</directory>
                </testsuite>
            </testsuites>
            <source>
                <include>
                    <directory suffix=".php">./app</directory>
                    <directory suffix=".php">./core</directory>
                    <directory suffix=".php">./public</directory>
                </include>
            </source>
        </phpunit>
        EOF
        fi

    - name: Create test bootstrap if not exists
      run: |
        mkdir -p tests
        if [ ! -f tests/bootstrap.php ]; then
          echo "Creating test bootstrap"
          cat > tests/bootstrap.php << 'EOF'
        <?php
        // Test Bootstrap for Student Survey System
        require_once __DIR__ . '/../vendor/autoload.php';
        
        // Set test environment
        $_ENV['APP_ENV'] = 'testing';
        $_ENV['DB_HOST'] = '127.0.0.1';
        $_ENV['DB_NAME'] = 'test_survey_db';
        $_ENV['DB_USER'] = 'root';
        $_ENV['DB_PASS'] = 'root';
        
        echo "Test environment initialized\n";
        EOF
        fi

    - name: Run test suite
      run: |
        if [ -d tests ] && [ -f vendor/bin/phpunit ]; then
          composer run-script test
        else
          echo "No tests found or PHPUnit not installed, running syntax check only"
          echo "Tests will be added in future iterations"
        fi

    - name: Code Style Check
      run: |
        if [ -f vendor/bin/phpcs ]; then
          composer run-script cs-check || echo "Code style issues found, but not failing build"
        else
          echo "PHP_CodeSniffer not installed, skipping code style check"
        fi

    - name: Build frontend assets
      run: |
        if [ -f package.json ] && [ -f webpack.config.js ]; then
          npm run build
        else
          echo "No build script found, skipping asset build"
        fi

    - name: Run basic integration tests
      run: |
        echo "Running basic integration tests..."
        php -r "
        echo 'Testing basic PHP functionality...\n';
        if (extension_loaded('pdo_mysql')) {
            echo '✓ MySQL PDO extension loaded\n';
        } else {
            echo '✗ MySQL PDO extension not found\n';
            exit(1);
        }
        
        if (function_exists('curl_init')) {
            echo '✓ cURL extension available\n';
        } else {
            echo '✗ cURL extension not found\n';
            exit(1);
        }
        
        echo 'Basic integration tests passed!\n';
        "

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Security Scan
      run: |
        echo "Running security checks..."
        # Check for common security issues
        find . -name "*.php" -not -path "./vendor/*" -exec grep -l "mysql_query\|eval\|exec\|system\|passthru\|shell_exec" {} \; || echo "No obvious security issues found"
        
        # Check for hardcoded credentials
        if grep -r -n "password.*=.*['\"][^'\"]*['\"]" --include="*.php" . --exclude-dir=vendor --exclude-dir=tests; then
          echo "Warning: Potential hardcoded passwords found"
        else
          echo "✓ No hardcoded passwords detected"
        fi
