<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUI Test Reports - Index</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .report-card {
            background: #f8f9fa;
            padding: 25px;
            margin: 15px 0;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            transition: transform 0.3s;
        }
        .report-card:hover {
            transform: translateX(5px);
        }
        .report-card h3 {
            margin: 0 0 10px 0;
            color: #667eea;
        }
        .report-card p {
            margin: 5px 0;
            color: #6c757d;
        }
        .report-card a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .report-card a:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖥️ GUI Testing Reports</h1>
        
        <div class="report-card">
            <h3>Complete GUI Test Report</h3>
            <p>Comprehensive testing of all UI components, pages, forms, navigation, and responsiveness</p>
            <p><strong>Date:</strong> December 22, 2025 08:08:49</p>
            <a href="gui_test_report.html">View Report →</a>
        </div>
        
        <div class="report-card">
            <h3>JSON Test Results</h3>
            <p>Raw test data in JSON format for programmatic access</p>
            <a href="gui_test_results.json">Download JSON →</a>
        </div>
    </div>
</body>
</html>
